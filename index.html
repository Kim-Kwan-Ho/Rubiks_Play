<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <meta name="description" content="RubiksPlay puzzle game.">
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,viewport-fit=cover">

  <title>RubiksPlay</title>
  <meta property="og:description" content="RubiksPlay puzzle game."/>
  <meta property="og:site_name" content="RubiksPlay"/>
  <meta property="og:title" content="RubiksPlay"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://kim-kwan-ho.github.io/Rubiks_Play/"/>

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RubiksPlay">
  <meta name="twitter:description" content="RubiksPlay puzzle game.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="RubiksPlay">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="translucent-black">

  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" type="text/css" href="assets/css/styles.css">
  <style>
    html,
    body {
      width: 100%;
      min-width: 320px;
      min-height: 100vh;
      min-height: 100dvh;
    }

    body {
      position: relative;
      overflow: hidden;
    }

    .ui {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .ui__texts,
    .ui__prefs,
    .ui__theme,
    .ui__stats,
    .ui__buttons {
      display: none !important;
    }

    .ui__top-banner {
      position: fixed;
      top: max(calc(env(safe-area-inset-top, 0px) + 14px), clamp(16px, 3.2vh, 34px));
      left: 50%;
      z-index: 6;
      transform: translateX(-50%);
      width: min(calc(100vw - 24px), 760px);
      padding: 0.45rem 1.2rem;
      border: 2px solid rgba(7, 13, 21, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #070d15;
      font-family: 'BungeeFont', sans-serif;
      font-size: clamp(24px, 1.8vw, 40px);
      letter-spacing: clamp(0.04em, 0.12vw, 0.08em);
      text-align: center;
      text-transform: uppercase;
      line-height: 1.05;
      white-space: normal;
      text-wrap: balance;
      box-shadow: 0 10px 30px rgba(7, 13, 21, 0.08);
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 1 !important;
      visibility: visible !important;
    }

    @media (max-width: 767px) {
      .ui__top-banner {
        width: min(calc(100vw - 20px), 92vw);
        padding: 0.5rem 0.85rem;
        font-size: clamp(20px, 6vw, 30px);
        border-radius: 24px;
      }
    }

    @media (min-width: 1920px) {
      .ui__top-banner {
        width: min(760px, calc(100vw - 64px));
        font-size: 40px;
      }
    }
  </style>

  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-128627708-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-128627708-1');
  </script>

  <script>
    window.gameVersion = '0.99.10';
  </script>

</head>
<body>

  <div class="ui">

    <div class="ui__background"></div>

    <div class="ui__game"></div>

    <div class="ui__top-banner">Originality 2026</div>

    <div class="ui__texts">
      <h1 class="text text--title"></h1>
      <div class="text text--note"></div>
      <div class="text text--timer"></div>
      <div class="text text--complete"></div>
      <div class="text text--best-time"></div>
    </div>

    <div class="ui__prefs">
      <range name="size" title="Cube Size" list="2,3,4,5"></range>
      <range name="flip" title="Flip Type" list="Swift&nbsp;,Smooth,Bounce"></range>
      <range name="scramble" title="Scramble Length" list="20,25,30"></range>
      <range name="fov" title="Camera Angle" list="Ortographic,Perspective"></range>
      <range name="theme" title="Color Scheme" list="Cube,Erno,Dust,Camo,Rain"></range>
    </div>

    <div class="ui__theme">
      <range name="hue" title="Hue" color></range>
      <range name="saturation" title="Saturation" color></range>
      <range name="lightness" title="Lightness" color></range>
    </div>

    <div class="ui__stats">
      <div class="stats" name="cube-size">
        <i>Cube:</i><b>3x3x3</b>
      </div>
      <div class="stats" name="total-solves">
        <i>Total solves:</i><b>-</b>
      </div>
      <div class="stats" name="best-time">
        <i>Best time:</i><b>-</b>
      </div>
      <div class="stats" name="worst-time">
        <i>Worst time:</i><b>-</b>
      </div>
      <div class="stats" name="average-5">
        <i>Average of 5:</i><b>-</b>
      </div>
      <div class="stats" name="average-12">
        <i>Average of 12:</i><b>-</b>
      </div>
      <div class="stats" name="average-25">
        <i>Average of 25:</i><b>-</b>
      </div>
    </div>

    <div class="ui__buttons">
      <button class="btn btn--bl btn--stats">
        <icon trophy></icon>
      </button>
      <button class="btn btn--br btn--prefs">
        <icon settings></icon>
      </button>
      <button class="btn btn--bl btn--back">
        <icon back></icon>
      </button>
      <button class="btn btn--br btn--theme">
        <icon theme></icon>
      </button>
      <button class="btn btn--br btn--reset">
        <icon reset></icon>
      </button>
    </div>

  </div>

  <script src="assets/js/three.js"></script>
  <script src="assets/js/cube.js"></script>
  <script src="assets/js/app-config.js"></script>
  <script src="assets/js/face-images.generated.js"></script>
  <script src="assets/js/face-tiles.generated.js"></script>
  <script src="assets/js/face-textures.js"></script>

  <script src="upup.min.js"></script>
  <script>
    if (location.protocol !== 'file:' && UpUp !== null) {
      UpUp.start({
        'cache-version': window.gameVersion,
        'content-url': 'index.html',
        'assets': [ 'assets/css/styles.css', 'assets/js/three.js', 'assets/js/cube.js', 'assets/js/app-config.js', 'assets/js/face-images.generated.js', 'assets/js/face-tiles.generated.js', 'assets/js/face-textures.js' ]
      });
    }
  </script>

</body>
</html>
